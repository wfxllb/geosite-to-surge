name: Update GeoSite Rules

on:
  schedule:
    # 每天 UTC 00:00（北京时间 08:00）
    - cron: "0 0 * * *"
  workflow_dispatch:
    # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone upstream domain list
        run: |
          git clone --depth 1 https://github.com/v2fly/domain-list-community.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run converter
        run: python convert.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet rules/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will commit."
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          git commit -m "🔄 Auto-update geosite rules [$(date +%Y-%m-%d)]"
          git push
